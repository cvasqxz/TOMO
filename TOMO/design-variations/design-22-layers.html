<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TOMO - Design 22: Layers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Questrial&family=Kode+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Questrial', sans-serif;
      background: #282a36;
      color: #f8f8f2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }
    .layers {
      position: relative;
      width: 500px;
      height: 600px;
    }
    .layer {
      position: absolute;
      width: 100%;
      background: #44475a;
      border: 2px solid #6272a4;
      border-radius: 12px;
      padding: 2rem;
      transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }
    .layer:nth-child(1) {
      top: 0;
      left: 0;
      z-index: 3;
      transform: rotate(-3deg);
    }
    .layer:nth-child(2) {
      top: 40px;
      left: 20px;
      z-index: 2;
      transform: rotate(2deg);
      background: #6272a4;
    }
    .layer:nth-child(3) {
      top: 80px;
      left: 40px;
      z-index: 1;
      transform: rotate(-1deg);
      background: #44475a;
    }
    .layer:hover {
      z-index: 10;
      transform: rotate(0deg) scale(1.05);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    h1 {
      font-size: 2.5rem;
      font-family: 'Kode Mono', monospace;
      color: #50fa7b;
      margin-bottom: 1rem;
    }
    .layer-title {
      font-size: 0.875rem;
      color: #bd93f9;
      margin-bottom: 1.5rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
    }
    button {
      width: 100%;
      background: transparent;
      border: 2px solid #ff79c6;
      color: #ff79c6;
      padding: 1rem;
      font-family: 'Questrial', sans-serif;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 1rem;
    }
    button:hover {
      background: #ff79c6;
      color: #282a36;
    }
  </style>
</head>
<body>
  <div class="layers">
    <div class="layer">
      <h1># TOMO</h1>
      <div class="layer-title">Main Layer</div>
      <button id="open-file">Open File</button>
      <button id="theme-toggle">Toggle Theme</button>
      <p style="color: #6272a4; font-size: 0.875rem; margin-top: 2rem;">
        Hover over each layer to explore
      </p>
    </div>

    <div class="layer">
      <div class="layer-title">Markdown Layer</div>
      <p style="color: #f8f8f2; line-height: 1.6;">
        Beautiful rendering of your .md and .markdown files with syntax highlighting.
      </p>
    </div>

    <div class="layer">
      <div class="layer-title">Theme Layer</div>
      <p style="color: #f8f8f2; line-height: 1.6;">
        Switch between Dracula and Alucard themes for the perfect reading experience.
      </p>
    </div>
  </div>
</body>
</html>
