<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TOMO - Design 25: Floating</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Questrial&family=Kode+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Questrial', sans-serif;
      background: linear-gradient(135deg, #fffbeb 0%, #f5ede1 100%);
      color: #1f1f1f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }
    .bg-shapes {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
    }
    .shape {
      position: absolute;
      border-radius: 50%;
      opacity: 0.1;
      animation: float 20s infinite ease-in-out;
    }
    .shape-1 {
      width: 300px;
      height: 300px;
      background: #644ac9;
      top: 10%;
      left: 10%;
      animation-delay: 0s;
    }
    .shape-2 {
      width: 200px;
      height: 200px;
      background: #a3144d;
      bottom: 20%;
      right: 15%;
      animation-delay: 5s;
    }
    .shape-3 {
      width: 150px;
      height: 150px;
      background: #14710a;
      top: 50%;
      right: 20%;
      animation-delay: 10s;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      33% { transform: translateY(-30px) rotate(120deg); }
      66% { transform: translateY(30px) rotate(240deg); }
    }
    .container {
      position: relative;
      z-index: 1;
      max-width: 500px;
      text-align: center;
    }
    .logo {
      background: white;
      border-radius: 24px;
      padding: 3rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.1);
      margin-bottom: 2rem;
      animation: floatCard 6s ease-in-out infinite;
    }
    @keyframes floatCard {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    h1 {
      font-size: 4rem;
      font-family: 'Kode Mono', monospace;
      background: linear-gradient(135deg, #644ac9, #a3144d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }
    .tagline {
      color: #6c664b;
      font-size: 1rem;
    }
    .actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }
    .fab {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: white;
      border: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      transition: all 0.3s;
    }
    .fab:hover {
      transform: scale(1.1);
      box-shadow: 0 12px 32px rgba(0,0,0,0.2);
    }
    .fab:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>
  <div class="bg-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>

  <div class="container">
    <div class="logo">
      <h1>TOMO</h1>
      <div class="tagline">Markdown Reader</div>
    </div>

    <div class="actions">
      <button class="fab" id="open-file" title="Open File">📄</button>
      <button class="fab" id="theme-toggle" title="Toggle Theme">☀︎</button>
    </div>
  </div>
</body>
</html>
