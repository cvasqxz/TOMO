<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TOMO - Design 24: Bento Grid</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Questrial&family=Kode+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Questrial', sans-serif;
      background: #282a36;
      color: #f8f8f2;
      padding: 3rem;
      min-height: 100vh;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
    }
    .bento {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(3, 150px);
      gap: 1rem;
    }
    .box {
      background: #44475a;
      border-radius: 16px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      transition: all 0.3s;
      cursor: pointer;
      border: 2px solid transparent;
    }
    .box:hover {
      border-color: #bd93f9;
      transform: translateY(-4px);
    }
    .box-1 {
      grid-column: 1 / 3;
      grid-row: 1 / 3;
      background: linear-gradient(135deg, #bd93f9, #ff79c6);
      color: #282a36;
    }
    .box-2 {
      grid-column: 3 / 5;
      grid-row: 1 / 2;
    }
    .box-3 {
      grid-column: 3 / 5;
      grid-row: 2 / 3;
    }
    .box-4 {
      grid-column: 1 / 3;
      grid-row: 3 / 4;
    }
    .box-5 {
      grid-column: 3 / 4;
      grid-row: 3 / 4;
    }
    .box-6 {
      grid-column: 4 / 5;
      grid-row: 3 / 4;
    }
    h1 {
      font-size: 3rem;
      font-family: 'Kode Mono', monospace;
      margin-bottom: 1rem;
    }
    .box-title {
      font-size: 1.25rem;
      margin-bottom: 0.5rem;
      font-weight: 600;
    }
    .box-desc {
      font-size: 0.875rem;
      opacity: 0.7;
    }
    .box-icon {
      font-size: 2rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="bento">
      <div class="box box-1">
        <h1># TOMO</h1>
        <p>Your minimal markdown reader</p>
      </div>

      <div class="box box-2" id="open-file">
        <div class="box-icon">📂</div>
        <div class="box-title">Open File</div>
        <div class="box-desc">Load your markdown</div>
      </div>

      <div class="box box-3" id="theme-toggle">
        <div class="box-icon">🌓</div>
        <div class="box-title">Theme</div>
        <div class="box-desc">Light or Dark</div>
      </div>

      <div class="box box-4">
        <div class="box-title">Features</div>
        <div class="box-desc">
          • Syntax highlighting<br>
          • Fast rendering<br>
          • Drag & drop support
        </div>
      </div>

      <div class="box box-5">
        <div class="box-icon">⚡</div>
        <div class="box-desc">Built with Tauri</div>
      </div>

      <div class="box box-6">
        <div class="box-icon">🎨</div>
        <div class="box-desc">Dracula Theme</div>
      </div>
    </div>
  </div>
</body>
</html>
