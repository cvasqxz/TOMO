<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TOMO - Design 15: VS Code Style</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Questrial&family=Kode+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Questrial', sans-serif;
      background: #282a36;
      color: #f8f8f2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .titlebar {
      height: 35px;
      background: #1e1f2b;
      display: flex;
      align-items: center;
      padding: 0 1rem;
      gap: 1rem;
      font-size: 0.75rem;
      color: #6272a4;
    }
    .menu-item {
      padding: 0 0.5rem;
      cursor: pointer;
    }
    .menu-item:hover {
      color: #f8f8f2;
    }
    .activitybar {
      width: 48px;
      background: #1e1f2b;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      padding: 1rem 0;
      align-items: center;
    }
    .activity-icon {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #6272a4;
      font-size: 1.25rem;
      transition: all 0.2s;
    }
    .activity-icon:hover,
    .activity-icon.active {
      color: #f8f8f2;
    }
    .sidebar {
      width: 300px;
      background: #282a36;
      border-right: 1px solid #44475a;
      padding: 1rem;
    }
    .sidebar-title {
      font-size: 0.75rem;
      color: #6272a4;
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .explorer-item {
      padding: 0.5rem;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .explorer-item:hover {
      background: #44475a;
    }
    .main-container {
      display: flex;
      flex: 1;
    }
    .editor {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
    }
    .welcome {
      text-align: center;
      max-width: 500px;
    }
    .welcome h1 {
      font-size: 2rem;
      color: #bd93f9;
      margin-bottom: 2rem;
      font-family: 'Kode Mono', monospace;
    }
    .actions {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      align-items: flex-start;
    }
    .action-link {
      color: #8be9fd;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s;
    }
    .action-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="titlebar">
    <span class="menu-item">File</span>
    <span class="menu-item">Edit</span>
    <span class="menu-item">View</span>
    <span class="menu-item">Help</span>
    <div style="flex: 1;"></div>
    <span># TOMO - Markdown Reader</span>
  </div>

  <div class="main-container">
    <div class="activitybar">
      <div class="activity-icon active">📁</div>
      <div class="activity-icon" id="theme-toggle">☾</div>
    </div>

    <div class="sidebar">
      <div class="sidebar-title">Explorer</div>
      <div class="explorer-item" id="open-file">
        <span>📄</span>
        <span>Open File...</span>
      </div>
      <div class="explorer-item">
        <span>📂</span>
        <span>Open Folder...</span>
      </div>
    </div>

    <div class="editor">
      <div class="welcome">
        <h1># TOMO</h1>
        <div class="actions">
          <div class="action-link" id="open-file-2">Open file...</div>
          <div class="action-link">Recent files</div>
          <div class="action-link">Clone repository</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
