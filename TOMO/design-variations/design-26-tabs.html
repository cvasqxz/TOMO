<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TOMO - Design 26: Tabs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Questrial&family=Kode+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Questrial', sans-serif;
      background: #282a36;
      color: #f8f8f2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .tab-bar {
      background: #1e1f2b;
      display: flex;
      gap: 0.25rem;
      padding: 0.5rem 1rem 0;
      border-bottom: 1px solid #44475a;
    }
    .tab {
      background: transparent;
      border: none;
      color: #6272a4;
      padding: 0.75rem 1.5rem;
      font-family: 'Questrial', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      border-radius: 8px 8px 0 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      position: relative;
    }
    .tab:hover {
      background: rgba(68, 71, 90, 0.5);
      color: #f8f8f2;
    }
    .tab.active {
      background: #282a36;
      color: #f8f8f2;
    }
    .tab.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: #bd93f9;
    }
    .tab-close {
      opacity: 0;
      transition: opacity 0.2s;
    }
    .tab:hover .tab-close {
      opacity: 1;
    }
    .content {
      flex: 1;
      padding: 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .welcome {
      text-align: center;
      max-width: 600px;
    }
    h1 {
      font-size: 3rem;
      font-family: 'Kode Mono', monospace;
      color: #50fa7b;
      margin-bottom: 1rem;
    }
    .subtitle {
      color: #6272a4;
      margin-bottom: 3rem;
      font-size: 1.125rem;
    }
    .cta {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }
    button.action {
      background: #44475a;
      border: 2px solid #bd93f9;
      color: #bd93f9;
      padding: 1rem 2rem;
      font-family: 'Questrial', sans-serif;
      cursor: pointer;
      transition: all 0.3s;
      border-radius: 8px;
    }
    button.action:hover {
      background: #bd93f9;
      color: #282a36;
    }
  </style>
</head>
<body>
  <div class="tab-bar">
    <div class="tab active">
      <span>📄</span>
      <span>Welcome.md</span>
      <span class="tab-close">×</span>
    </div>
    <div class="tab">
      <span>+</span>
      <span>New Tab</span>
    </div>
  </div>

  <div class="content">
    <div class="welcome">
      <h1># TOMO</h1>
      <div class="subtitle">
        Open your first markdown file to begin reading
      </div>
      <div class="cta">
        <button class="action" id="open-file">
          📂 Open File
        </button>
        <button class="action" id="theme-toggle">
          ☾ Toggle Theme
        </button>
      </div>
    </div>
  </div>
</body>
</html>
