<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TOMO - Design 09: Magazine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Questrial&family=Kode+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Questrial', sans-serif;
      background: #fffbeb;
      color: #1f1f1f;
      padding: 3rem;
      min-height: 100vh;
    }
    .layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 3rem;
      max-width: 1200px;
      margin: 0 auto;
    }
    .hero {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 70vh;
    }
    h1 {
      font-size: 8rem;
      line-height: 0.9;
      font-family: 'Kode Mono', monospace;
      color: #a3144d;
      margin-bottom: 1rem;
    }
    .tagline {
      font-size: 1.5rem;
      color: #6c664b;
      margin-bottom: 3rem;
    }
    .hero-bottom {
      display: flex;
      gap: 2rem;
    }
    .sidebar {
      border-left: 3px solid #a3144d;
      padding-left: 2rem;
    }
    .sidebar-section {
      margin-bottom: 3rem;
    }
    .sidebar-title {
      font-size: 0.875rem;
      color: #6c664b;
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    button {
      background: #a3144d;
      border: none;
      color: #fffbeb;
      padding: 1rem 2rem;
      font-family: 'Questrial', sans-serif;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
      width: 100%;
      text-align: left;
      margin-bottom: 0.5rem;
    }
    button:hover {
      background: #644ac9;
    }
    .feature {
      font-size: 0.875rem;
      color: #6c664b;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div class="layout">
    <div class="hero">
      <div>
        <h1>TOMO</h1>
        <div class="tagline">Read markdown in style</div>
      </div>
      <div class="hero-bottom">
        <div class="feature">
          ◆ Minimal interface<br>
          ◆ Dark & Light themes<br>
          ◆ Syntax highlighting<br>
          ◆ Fast & responsive
        </div>
      </div>
    </div>

    <div class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-title">Get Started</div>
        <button id="open-file">Open File →</button>
        <button id="theme-toggle">Toggle Theme →</button>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-title">Quick Access</div>
        <div class="feature">
          Drag and drop any markdown file to this window to start reading immediately.
        </div>
      </div>
    </div>
  </div>
</body>
</html>
