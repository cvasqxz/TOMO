<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TOMO - Design 27: Spotlight</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Questrial&family=Kode+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Questrial', sans-serif;
      background: #1f1f1f;
      color: #f8f8f2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }
    .spotlight {
      position: absolute;
      width: 800px;
      height: 800px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(189,147,249,0.2) 0%, transparent 70%);
      pointer-events: none;
      transition: all 0.3s ease;
    }
    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 600px;
    }
    h1 {
      font-size: 6rem;
      font-family: 'Kode Mono', monospace;
      color: #f8f8f2;
      margin-bottom: 2rem;
      text-shadow: 0 0 40px rgba(189,147,249,0.5);
      animation: glow 3s ease-in-out infinite;
    }
    @keyframes glow {
      0%, 100% { text-shadow: 0 0 40px rgba(189,147,249,0.5); }
      50% { text-shadow: 0 0 80px rgba(189,147,249,0.8), 0 0 120px rgba(255,121,198,0.5); }
    }
    .subtitle {
      font-size: 1.25rem;
      color: #6272a4;
      margin-bottom: 3rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }
    .actions-spotlight {
      display: flex;
      gap: 2rem;
      justify-content: center;
      margin-bottom: 3rem;
    }
    .spot-btn {
      background: rgba(68, 71, 90, 0.3);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(189, 147, 249, 0.5);
      color: #f8f8f2;
      padding: 1.25rem 2.5rem;
      font-family: 'Questrial', sans-serif;
      font-size: 1rem;
      cursor: pointer;
      border-radius: 50px;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }
    .spot-btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      background: rgba(189, 147, 249, 0.3);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }
    .spot-btn:hover::before {
      width: 300px;
      height: 300px;
    }
    .spot-btn:hover {
      border-color: #bd93f9;
      box-shadow: 0 0 30px rgba(189, 147, 249, 0.5);
      transform: translateY(-2px);
    }
    .spot-btn span {
      position: relative;
      z-index: 1;
    }
    .hint {
      color: #44475a;
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <div class="spotlight" id="spotlight"></div>

  <div class="container">
    <h1>TOMO</h1>
    <div class="subtitle">Markdown Reader</div>

    <div class="actions-spotlight">
      <button class="spot-btn" id="open-file">
        <span>📄 Open File</span>
      </button>
      <button class="spot-btn" id="theme-toggle">
        <span>☾ Theme</span>
      </button>
    </div>

    <div class="hint">
      Move your mouse to reveal the spotlight
    </div>
  </div>

  <script>
    const spotlight = document.getElementById('spotlight');
    document.addEventListener('mousemove', (e) => {
      spotlight.style.left = e.clientX - 400 + 'px';
      spotlight.style.top = e.clientY - 400 + 'px';
    });
  </script>
</body>
</html>
