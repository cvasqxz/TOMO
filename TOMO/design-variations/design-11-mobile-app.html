<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TOMO - Design 11: Mobile App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Questrial&family=Kode+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Questrial', sans-serif;
      background: #fffbeb;
      color: #1f1f1f;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .phone {
      max-width: 375px;
      width: 100%;
      background: white;
      border-radius: 32px;
      padding: 2rem 1.5rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      min-height: 667px;
      display: flex;
      flex-direction: column;
    }
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.75rem;
      color: #6c664b;
      margin-bottom: 2rem;
    }
    .app-header {
      text-align: center;
      margin-bottom: 3rem;
    }
    h1 {
      font-size: 2.5rem;
      font-family: 'Kode Mono', monospace;
      color: #644ac9;
      margin-bottom: 0.5rem;
    }
    .version {
      font-size: 0.75rem;
      color: #6c664b;
    }
    .menu {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .menu-item {
      background: linear-gradient(135deg, #f5f3f0, #e8ddd0);
      border: none;
      padding: 1.5rem;
      border-radius: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: all 0.3s;
    }
    .menu-item:active {
      transform: scale(0.98);
    }
    .menu-icon {
      font-size: 1.5rem;
    }
    .menu-text {
      flex: 1;
      margin-left: 1rem;
      text-align: left;
    }
    .menu-title {
      font-size: 1rem;
      color: #1f1f1f;
      margin-bottom: 0.25rem;
    }
    .menu-desc {
      font-size: 0.75rem;
      color: #6c664b;
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="status-bar">
      <span>9:41</span>
      <span>● ● ●</span>
    </div>

    <div class="app-header">
      <h1># TOMO</h1>
      <div class="version">v0.1.0</div>
    </div>

    <div class="menu">
      <button class="menu-item" id="open-file">
        <span class="menu-icon">📄</span>
        <div class="menu-text">
          <div class="menu-title">Open File</div>
          <div class="menu-desc">Browse markdown files</div>
        </div>
        <span>›</span>
      </button>

      <button class="menu-item" id="theme-toggle">
        <span class="menu-icon">☾</span>
        <div class="menu-text">
          <div class="menu-title">Appearance</div>
          <div class="menu-desc">Light or Dark theme</div>
        </div>
        <span>›</span>
      </button>

      <div class="menu-item" style="background: linear-gradient(135deg, #cfcfde, #d9cfc5); opacity: 0.6;">
        <span class="menu-icon">📚</span>
        <div class="menu-text">
          <div class="menu-title">Recent Files</div>
          <div class="menu-desc">No files yet</div>
        </div>
        <span>›</span>
      </div>
    </div>
  </div>
</body>
</html>
