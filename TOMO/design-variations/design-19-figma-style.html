<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TOMO - Design 19: Figma Style</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Questrial&family=Kode+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Questrial', sans-serif;
      background: #282a36;
      color: #f8f8f2;
      min-height: 100vh;
      display: flex;
    }
    .toolbar {
      width: 100%;
      height: 40px;
      background: #1e1f2b;
      position: fixed;
      top: 0;
      left: 0;
      display: flex;
      align-items: center;
      padding: 0 1rem;
      gap: 0.5rem;
      border-bottom: 1px solid #44475a;
      z-index: 100;
    }
    .tool-btn {
      width: 32px;
      height: 32px;
      background: transparent;
      border: none;
      border-radius: 4px;
      color: #6272a4;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .tool-btn:hover {
      background: #44475a;
      color: #f8f8f2;
    }
    .tool-btn.active {
      background: #bd93f9;
      color: #282a36;
    }
    .divider {
      width: 1px;
      height: 20px;
      background: #44475a;
      margin: 0 0.25rem;
    }
    .logo {
      font-family: 'Kode Mono', monospace;
      font-size: 0.875rem;
      color: #50fa7b;
      margin-left: auto;
    }
    .panels {
      display: flex;
      width: 100%;
      margin-top: 40px;
    }
    .left-panel {
      width: 240px;
      background: #1e1f2b;
      padding: 1rem;
      border-right: 1px solid #44475a;
    }
    .panel-title {
      font-size: 0.75rem;
      color: #6272a4;
      margin-bottom: 1rem;
      text-transform: uppercase;
    }
    .layer {
      padding: 0.5rem;
      margin-bottom: 0.25rem;
      background: transparent;
      border: none;
      color: #f8f8f2;
      text-align: left;
      width: 100%;
      cursor: pointer;
      border-radius: 4px;
      font-family: 'Questrial', sans-serif;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.2s;
    }
    .layer:hover {
      background: #44475a;
    }
    .canvas {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #282a36;
      padding: 3rem;
    }
    .frame {
      background: #44475a;
      border: 1px solid #6272a4;
      border-radius: 8px;
      padding: 3rem;
      max-width: 500px;
      text-align: center;
    }
    .frame h1 {
      font-size: 2.5rem;
      color: #bd93f9;
      font-family: 'Kode Mono', monospace;
      margin-bottom: 1rem;
    }
    .frame p {
      color: #6272a4;
      margin-bottom: 2rem;
    }
    .right-panel {
      width: 280px;
      background: #1e1f2b;
      padding: 1rem;
      border-left: 1px solid #44475a;
    }
    .property {
      margin-bottom: 1.5rem;
    }
    .property-label {
      font-size: 0.75rem;
      color: #6272a4;
      margin-bottom: 0.5rem;
    }
    .property-value {
      background: #282a36;
      border: 1px solid #44475a;
      padding: 0.5rem;
      border-radius: 4px;
      color: #f8f8f2;
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button class="tool-btn">📐</button>
    <button class="tool-btn active" id="open-file">📄</button>
    <button class="tool-btn">✏️</button>
    <div class="divider"></div>
    <button class="tool-btn">▢</button>
    <button class="tool-btn">○</button>
    <button class="tool-btn">★</button>
    <div class="divider"></div>
    <button class="tool-btn" id="theme-toggle">☾</button>
    <div class="logo"># TOMO</div>
  </div>

  <div class="panels">
    <div class="left-panel">
      <div class="panel-title">Layers</div>
      <button class="layer">
        <span>📄</span>
        <span>Welcome Frame</span>
      </button>
      <button class="layer">
        <span>📝</span>
        <span>Content</span>
      </button>
    </div>

    <div class="canvas">
      <div class="frame">
        <h1># TOMO</h1>
        <p>Drag and drop your markdown file here or use the file button in the toolbar</p>
      </div>
    </div>

    <div class="right-panel">
      <div class="panel-title">Properties</div>
      <div class="property">
        <div class="property-label">Name</div>
        <div class="property-value">TOMO Reader</div>
      </div>
      <div class="property">
        <div class="property-label">Type</div>
        <div class="property-value">Markdown Viewer</div>
      </div>
      <div class="property">
        <div class="property-label">Theme</div>
        <div class="property-value">Dracula</div>
      </div>
    </div>
  </div>
</body>
</html>
