<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TOMO - Design 07: Zen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Questrial&family=Kode+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Questrial', sans-serif;
      background: #fffbeb;
      color: #1f1f1f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      min-height: 100vh;
      padding: 4rem 2rem;
    }
    .top {
      text-align: center;
    }
    h1 {
      font-size: 5rem;
      font-weight: 400;
      font-family: 'Kode Mono', monospace;
      color: #1f1f1f;
      margin-bottom: 1rem;
    }
    .divider {
      width: 60px;
      height: 2px;
      background: #a3144d;
      margin: 2rem auto;
    }
    .center {
      text-align: center;
      max-width: 300px;
    }
    .instruction {
      font-size: 1.125rem;
      line-height: 1.8;
      color: #6c664b;
      margin-bottom: 3rem;
    }
    .actions {
      display: flex;
      gap: 3rem;
      justify-content: center;
    }
    .action-btn {
      background: none;
      border: none;
      color: #644ac9;
      font-size: 2rem;
      cursor: pointer;
      transition: all 0.3s;
      padding: 1rem;
    }
    .action-btn:hover {
      transform: scale(1.1);
      color: #a3144d;
    }
    .footer {
      font-size: 0.75rem;
      color: #cfcfde;
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="top">
    <h1>TOMO</h1>
  </div>

  <div class="center">
    <div class="instruction">
      読む
    </div>
    <div class="divider"></div>
    <div class="actions">
      <button class="action-btn" id="open-file">📖</button>
      <button class="action-btn" id="theme-toggle">○</button>
    </div>
  </div>

  <div class="footer">
    Markdown Reader
  </div>
</body>
</html>
