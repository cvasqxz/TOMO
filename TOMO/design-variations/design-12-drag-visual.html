<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TOMO - Design 12: Drag Visual</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Questrial&family=Kode+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Questrial', sans-serif;
      background: #282a36;
      color: #f8f8f2;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .header {
      padding: 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #44475a;
    }
    h1 {
      font-size: 1.5rem;
      font-family: 'Kode Mono', monospace;
      color: #50fa7b;
    }
    .header-actions {
      display: flex;
      gap: 1rem;
    }
    button {
      background: transparent;
      border: 1px solid #bd93f9;
      color: #bd93f9;
      padding: 0.5rem 1rem;
      font-family: 'Questrial', sans-serif;
      cursor: pointer;
      transition: all 0.3s;
      border-radius: 4px;
    }
    button:hover {
      background: #bd93f9;
      color: #282a36;
    }
    .drop-zone {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      position: relative;
    }
    .drop-visual {
      text-align: center;
      transition: all 0.3s;
    }
    .file-icon {
      font-size: 8rem;
      margin-bottom: 2rem;
      opacity: 0.3;
      transition: all 0.3s;
    }
    .drop-zone:hover .file-icon {
      opacity: 0.6;
      transform: scale(1.1);
    }
    .drop-text {
      font-size: 1.5rem;
      color: #6272a4;
      margin-bottom: 1rem;
    }
    .drop-hint {
      font-size: 0.875rem;
      color: #44475a;
    }
    .arrow {
      position: absolute;
      font-size: 3rem;
      color: #44475a;
      animation: bounce 2s infinite;
    }
    .arrow-top { top: 10%; left: 50%; transform: translateX(-50%); }
    .arrow-bottom { bottom: 10%; left: 50%; transform: translateX(-50%) rotate(180deg); }
    .arrow-left { top: 50%; left: 10%; transform: translateY(-50%) rotate(90deg); }
    .arrow-right { top: 50%; right: 10%; transform: translateY(-50%) rotate(-90deg); }
    @keyframes bounce {
      0%, 100% { transform: translateY(0) translateX(-50%); }
      50% { transform: translateY(-10px) translateX(-50%); }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1># TOMO</h1>
    <div class="header-actions">
      <button id="open-file">Open</button>
      <button id="theme-toggle">☾</button>
    </div>
  </div>

  <div class="drop-zone">
    <div class="arrow arrow-top">↓</div>
    <div class="arrow arrow-bottom">↓</div>
    <div class="arrow arrow-left">↓</div>
    <div class="arrow arrow-right">↓</div>

    <div class="drop-visual">
      <div class="file-icon">📄</div>
      <div class="drop-text">Drop your markdown file</div>
      <div class="drop-hint">Supports .md and .markdown files</div>
    </div>
  </div>
</body>
</html>
