<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TOMO - Design 17: Presentation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Questrial&family=Kode+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Questrial', sans-serif;
      background: #282a36;
      color: #f8f8f2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .slide {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem;
      text-align: center;
    }
    .slide-number {
      position: absolute;
      top: 2rem;
      right: 2rem;
      font-size: 0.875rem;
      color: #6272a4;
      font-family: 'Kode Mono', monospace;
    }
    h1 {
      font-size: 6rem;
      font-family: 'Kode Mono', monospace;
      color: #50fa7b;
      margin-bottom: 2rem;
      line-height: 1;
    }
    .subtitle {
      font-size: 1.5rem;
      color: #bd93f9;
      margin-bottom: 4rem;
    }
    .bullets {
      text-align: left;
      font-size: 1.25rem;
      line-height: 2;
      color: #f8f8f2;
      margin-bottom: 3rem;
    }
    .bullets li {
      margin-bottom: 1rem;
      list-style: none;
    }
    .bullets li::before {
      content: '▸ ';
      color: #ff79c6;
      margin-right: 1rem;
    }
    .controls {
      display: flex;
      gap: 2rem;
      margin-top: 3rem;
    }
    button {
      background: transparent;
      border: 2px solid #8be9fd;
      color: #8be9fd;
      padding: 1rem 2.5rem;
      font-family: 'Questrial', sans-serif;
      font-size: 1.125rem;
      cursor: pointer;
      transition: all 0.3s;
    }
    button:hover {
      background: #8be9fd;
      color: #282a36;
    }
    .footer {
      padding: 2rem;
      text-align: center;
      border-top: 1px solid #44475a;
      color: #6272a4;
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <div class="slide-number">01</div>

  <div class="slide">
    <h1># TOMO</h1>
    <div class="subtitle">Markdown Reader</div>

    <ul class="bullets">
      <li>Beautiful markdown rendering</li>
      <li>Syntax highlighting</li>
      <li>Dual themes (Dracula & Alucard)</li>
    </ul>

    <div class="controls">
      <button id="open-file">Get Started →</button>
      <button id="theme-toggle">☾ Theme</button>
    </div>
  </div>

  <div class="footer">
    Press Space or click buttons to navigate
  </div>
</body>
</html>
