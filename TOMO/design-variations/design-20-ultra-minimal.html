<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TOMO - Design 20: Ultra Minimal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Questrial&family=Kode+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Kode Mono', monospace;
      background: #fffbeb;
      color: #1f1f1f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      max-width: 600px;
      width: 100%;
    }
    h1 {
      font-size: 8rem;
      font-weight: 400;
      line-height: 1;
      margin-bottom: 0;
      color: #1f1f1f;
    }
    .actions {
      margin-top: 4rem;
      display: flex;
      gap: 3rem;
    }
    button {
      background: none;
      border: none;
      color: #1f1f1f;
      font-family: 'Kode Mono', monospace;
      font-size: 1rem;
      cursor: pointer;
      padding: 0;
      transition: all 0.3s;
      position: relative;
    }
    button::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 1px;
      background: #1f1f1f;
      transition: width 0.3s;
    }
    button:hover::after {
      width: 100%;
    }
    .hint {
      margin-top: 4rem;
      font-size: 0.875rem;
      color: #6c664b;
      font-family: 'Questrial', sans-serif;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>TOMO</h1>
    <div class="actions">
      <button id="open-file">open</button>
      <button id="theme-toggle">theme</button>
    </div>
    <div class="hint">
      .md
    </div>
  </div>
</body>
</html>
