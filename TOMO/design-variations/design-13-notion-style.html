<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TOMO - Design 13: Notion Style</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Questrial&family=Kode+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Questrial', sans-serif;
      background: #fffbeb;
      color: #1f1f1f;
      min-height: 100vh;
    }
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: 240px;
      background: #f5f3f0;
      padding: 2rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .logo {
      padding: 0.5rem 1rem;
      font-family: 'Kode Mono', monospace;
      font-size: 1.25rem;
      color: #644ac9;
      margin-bottom: 1rem;
    }
    .sidebar-item {
      padding: 0.75rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: #1f1f1f;
      text-decoration: none;
      background: transparent;
      border: none;
      font-family: 'Questrial', sans-serif;
      font-size: 0.875rem;
      text-align: left;
    }
    .sidebar-item:hover {
      background: #e8ddd0;
    }
    .main {
      margin-left: 240px;
      padding: 3rem;
      max-width: 900px;
    }
    .page-title {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #1f1f1f;
    }
    .page-subtitle {
      font-size: 0.875rem;
      color: #6c664b;
      margin-bottom: 3rem;
    }
    .empty-state {
      background: white;
      border: 1px solid #e8ddd0;
      border-radius: 8px;
      padding: 4rem 2rem;
      text-align: center;
    }
    .empty-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      opacity: 0.3;
    }
    .empty-title {
      font-size: 1.125rem;
      margin-bottom: 0.5rem;
      color: #1f1f1f;
    }
    .empty-text {
      font-size: 0.875rem;
      color: #6c664b;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="logo"># TOMO</div>
    <button class="sidebar-item" id="open-file">
      <span>📄</span>
      <span>Open file</span>
    </button>
    <button class="sidebar-item">
      <span>🕐</span>
      <span>Recent</span>
    </button>
    <button class="sidebar-item" id="theme-toggle">
      <span>☀︎</span>
      <span>Appearance</span>
    </button>
    <button class="sidebar-item">
      <span>⚙</span>
      <span>Settings</span>
    </button>
  </div>

  <div class="main">
    <div class="page-title">Getting Started</div>
    <div class="page-subtitle">Start reading your markdown files</div>

    <div class="empty-state">
      <div class="empty-icon">📖</div>
      <div class="empty-title">No file opened</div>
      <div class="empty-text">
        Open a markdown file from the sidebar or drag it here to begin
      </div>
    </div>
  </div>
</body>
</html>
