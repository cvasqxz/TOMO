<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TOMO - Design 10: Asymmetric</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Questrial&family=Kode+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Questrial', sans-serif;
      background: #282a36;
      color: #f8f8f2;
      padding: 3rem;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 3rem;
    }
    .left {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 2rem;
    }
    h1 {
      font-size: 4rem;
      font-family: 'Kode Mono', monospace;
      color: #ff79c6;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      align-self: flex-start;
    }
    .controls {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .control-item {
      background: #44475a;
      padding: 1.5rem;
      cursor: pointer;
      transition: all 0.3s;
      border-left: 4px solid transparent;
    }
    .control-item:hover {
      border-left-color: #bd93f9;
      background: #6272a4;
    }
    .control-label {
      font-size: 0.75rem;
      color: #6272a4;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .control-item:hover .control-label {
      color: #f8f8f2;
    }
    .control-text {
      font-size: 1.125rem;
    }
    .right {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #44475a;
      border: 2px dashed #6272a4;
      padding: 3rem;
    }
    .drop-message {
      text-align: center;
      color: #6272a4;
      font-size: 1.25rem;
    }
  </style>
</head>
<body>
  <div class="left">
    <h1># TOMO</h1>
    <div class="controls">
      <div class="control-item" id="open-file">
        <div class="control-label">01 / Action</div>
        <div class="control-text">Open Markdown File</div>
      </div>
      <div class="control-item" id="theme-toggle">
        <div class="control-label">02 / Appearance</div>
        <div class="control-text">Switch Theme Mode</div>
      </div>
      <div class="control-item">
        <div class="control-label">03 / Info</div>
        <div class="control-text">About TOMO</div>
      </div>
    </div>
  </div>

  <div class="right">
    <div class="drop-message">
      Drop your markdown file here<br>
      <span style="font-size: 3rem; display: block; margin: 2rem 0;">📄</span>
      .md or .markdown supported
    </div>
  </div>
</body>
</html>
